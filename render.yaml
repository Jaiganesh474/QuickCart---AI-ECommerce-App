services:
  # AI Service (Python/Flask)
  - type: web
    name: quickcart-ai
    env: python
    rootDir: ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PORT
        value: 5000

  # Backend Service (Spring Boot)
  - type: web
    name: quickcart-backend
    env: java
    rootDir: backend
    buildCommand: chmod +x mvnw && ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: AI_SERVICE_URL
        fromService:
          name: quickcart-ai
          type: web
          property: host

  # Frontend Service (React/Vite)
  - type: static_site
    name: quickcart-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: quickcart-backend
          type: web
          property: host
