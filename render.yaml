services:
  # AI Service (Python/Flask)
  - type: web
    name: quickcart-ai
    env: python
    rootDir: ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free
    envVars:
      - key: PORT
        value: 5000

  # Backend Service (Spring Boot)
  - type: web
    name: quickcart-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: AI_SERVICE_URL
        fromService:
          name: quickcart-ai
          type: web
          property: host

  # Frontend Service (React/Vite)
  - type: web
    name: quickcart-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: quickcart-backend
          type: web
          property: host
